<!DOCTYPE html>
<html lang="pt-BR" class="light" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TDIA-CodeGen{% endblock %} • Fale com Seus Dados</title>

    <!-- Aplica o tema ANTES da pintura para evitar flash (compartilha a chave
         qi_theme_v2 com o app principal). Sem expressoes Jinja literais aqui. -->
    <script>
        (function () {
            try {
                var pref = localStorage.getItem('qi_theme_v2') || 'light';
                var root = document.documentElement;
                root.classList.remove('light', 'dark');
                root.classList.add(pref === 'dark' ? 'dark' : 'light');
            } catch (e) {}
        })();
    </script>

    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        fg: {
                            900: '#0a0c10', 800: '#0d1117', 700: '#161b22', 600: '#1c2128',
                            500: '#21262d', border: '#30363d', muted: '#8b949e', text: '#c9d1d9',
                            bright: '#e6edf3', accent: '#ff6347', 'accent-hover': '#ff4500',
                            green: '#39d353', blue: '#58a6ff',
                        }
                    },
                    fontFamily: {
                        mono: ['JetBrains Mono', 'Courier New', 'monospace'],
                        sans: ['Space Grotesk', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Space Grotesk', system-ui, sans-serif; }
        code, pre, .font-mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #484f58; }
        .fade-in { animation: fadeIn .35s cubic-bezier(.4,0,.2,1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* Sub-abas internas do módulo */
        .cg-subtab { color: #8b949e; padding-bottom: 10px; margin-bottom: -1px; border-bottom: 2px solid transparent; transition: all .15s; font-weight: 500; background: transparent; cursor: pointer; }
        .cg-subtab:hover { color: #c9d1d9; }
        .cg-subtab-active { color: #ff6347; border-bottom-color: #ff6347; }

        /* Botão toggle de tema (mesmo visual do app) */
        #themeToggle { display: flex; align-items: center; gap: 6px; background: transparent; border: 1px solid #30363d; border-radius: 8px; padding: 5px 10px; cursor: pointer; font-size: 11px; font-weight: 600; color: #8b949e; font-family: 'Space Grotesk', sans-serif; transition: all .2s; }
        #themeToggle:hover { border-color: #ff6347; color: #ff6347; }

        /* ── Light mode (legibilidade — evita o gotcha de texto invisível) ── */
        html.light { color-scheme: light; }
        html.light body { background: #f0f4f8; color: #1f2328; }
        html.light header { background-color: rgba(255,255,255,.85) !important; border-color: #d0d7de !important; }
        html.light .bg-fg-900 { background-color: #f0f4f8 !important; }
        html.light .bg-fg-800, html.light .bg-fg-800\/80 { background-color: #ffffff !important; }
        html.light .bg-fg-700 { background-color: #f6f8fa !important; }
        html.light .bg-fg-600 { background-color: #eaeef2 !important; }
        html.light .bg-fg-500 { background-color: #d0d7de !important; }
        html.light .text-fg-text { color: #1f2328 !important; }
        html.light .text-fg-muted { color: #57606a !important; }
        html.light .text-fg-bright { color: #0d1117 !important; }
        html.light .text-fg-green { color: #1a7f37 !important; }
        html.light .text-fg-blue { color: #0969da !important; }
        html.light .text-fg-accent { color: #e30613 !important; }
        html.light .bg-fg-accent { background-color: #e30613 !important; }
        html.light .hover\:text-fg-accent-hover:hover { color: #b52800 !important; }
        html.light .border-fg-border { border-color: #d0d7de !important; }
        html.light input, html.light select, html.light textarea { background-color: #ffffff !important; border-color: #d0d7de !important; color: #1f2328 !important; }
        html.light select option { background: #ffffff; color: #1f2328; }
        html.light .cg-subtab { color: #57606a; }
        html.light .cg-subtab:hover { color: #1f2328; }
        html.light .cg-subtab-active { color: #e30613; border-bottom-color: #e30613; }
        html.light #themeToggle { border-color: #d0d7de; color: #57606a; }
        html.light #themeToggle:hover { border-color: #e30613; color: #e30613; }
        html.light ::-webkit-scrollbar-thumb { background: #c8d3e0; }

        body, header, input, select, textarea { transition: background-color .25s ease, border-color .25s ease, color .2s ease; }

        /* ── P1a: editor / seletores / grade de resultados ───────── */
        .cg-lbl { display:block; font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:#8b949e; margin-bottom:4px; }
        .cg-select { width:100%; background:#161b22; border:1px solid #30363d; border-radius:8px; padding:8px 10px; font-size:13px; color:#c9d1d9; }
        .cg-btn-primary { background:#ff6347; color:#fff; border:none; border-radius:8px; padding:9px 14px; font-size:13px; font-weight:600; cursor:pointer; transition:all .15s; }
        .cg-btn-primary:hover { background:#ff4500; }
        .cg-btn-primary:disabled { opacity:.5; cursor:not-allowed; }
        .cg-btn-mini { background:transparent; border:1px solid #30363d; color:#8b949e; border-radius:6px; padding:4px 10px; font-size:11px; font-weight:600; cursor:pointer; transition:all .15s; }
        .cg-btn-mini:hover { border-color:#ff6347; color:#ff6347; }
        .cg-result-scroll { max-height:460px; overflow:auto; border-radius:8px; }
        .cg-py-pre { max-height:460px; overflow:auto; background:#0a0c10; border:1px solid #30363d; border-radius:8px; padding:14px; font-family:'JetBrains Mono',monospace; font-size:12px; line-height:1.55; color:#c9d1d9; white-space:pre; margin:0; }
        html.light .cg-py-pre { background:#f6f8fa; color:#1f2328; border-color:#d0d7de; }
        .cg-table { width:100%; border-collapse:collapse; font-size:12px; }
        .cg-table th { position:sticky; top:0; background:#161b22; color:#8b949e; text-align:left; padding:6px 10px; border-bottom:1px solid #30363d; font-weight:600; white-space:nowrap; text-transform:uppercase; font-size:10px; letter-spacing:.03em; }
        .cg-table td { padding:5px 10px; border-bottom:1px solid #21262d; white-space:nowrap; font-variant-numeric:tabular-nums; }
        .cg-table tr:hover td { background:rgba(255,99,71,.05); }
        .CodeMirror { height:auto; min-height:170px; border:1px solid #30363d; border-radius:8px; font-family:'JetBrains Mono',monospace; font-size:13px; }
        kbd { background:#21262d; border:1px solid #30363d; border-radius:4px; padding:0 5px; font-size:10px; font-family:'JetBrains Mono',monospace; }

        html.light .cg-select { background:#ffffff; border-color:#d0d7de; color:#1f2328; }
        html.light .cg-btn-primary { background:#e30613; }
        html.light .cg-btn-primary:hover { background:#b52800; }
        html.light .cg-btn-mini { border-color:#d0d7de; color:#57606a; }
        html.light .cg-btn-mini:hover { border-color:#e30613; color:#e30613; }
        html.light .cg-table th { background:#f6f8fa; color:#57606a; border-color:#d0d7de; }
        html.light .cg-table td { border-color:#eaeef2; }
        html.light .cg-table tr:hover td { background:rgba(227,6,19,.05); }
        html.light .CodeMirror { border-color:#d0d7de; }
        html.light kbd { background:#eaeef2; border-color:#d0d7de; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-fg-900 text-fg-text min-h-screen">

    <header class="sticky top-0 z-30 bg-fg-800/80 backdrop-blur border-b border-fg-border">
        <div class="max-w-[1400px] mx-auto px-4 sm:px-6 h-14 flex items-center justify-between gap-4">
            <div class="flex items-center gap-3 min-w-0">
                <a href="/" class="text-fg-muted hover:text-fg-accent transition-colors flex items-center gap-1.5 text-xs font-medium" title="Voltar ao Fale com Seus Dados">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    <span class="hidden sm:inline">Fale com Seus Dados</span>
                </a>
                <span class="text-fg-border">/</span>
                <span class="font-mono font-bold text-fg-accent tracking-tight">TDIA-CodeGen</span>
                <span class="hidden md:inline text-[10px] text-fg-muted uppercase tracking-widest border border-fg-border rounded px-1.5 py-0.5">Engenharia de Dados</span>
            </div>
            <div class="flex items-center gap-3">
                <button id="themeToggle" type="button" onclick="toggleCgTheme()" title="Alternar tema">
                    <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
                    <span id="themeLabel">Tema</span>
                </button>
                <div class="text-right leading-tight hidden sm:block">
                    <div class="text-xs font-semibold text-fg-text">{{ user.display_name or user.login }}</div>
                    <div class="text-[10px] text-fg-muted">{{ user_type_label }}</div>
                </div>
            </div>
        </div>
    </header>

    <main class="fade-in">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/codegen/codegen.js?v={{ static_v }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
